name: Publish pyalgoviz-heap-canvas to PyPI

on:
  push:
    tags:
      - "heap-canvas-v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e . -e plugins/pyalgoviz-heap-canvas
      - name: Import plugin and check it registers a CanvasType
        run: python -c "from pyalgoviz_heap_canvas import HEAP_CANVAS_TYPE; print(HEAP_CANVAS_TYPE)"

  build:
    needs: smoke-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/pyalgoviz-heap-canvas
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#heap-canvas-v}"
          PKG_VERSION=$(grep -oP '(?<=^version = ")[^"]+' pyproject.toml)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag heap-canvas-v$TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: pyalgoviz-heap-canvas-dist
          path: plugins/pyalgoviz-heap-canvas/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pyalgoviz-heap-canvas/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pyalgoviz-heap-canvas-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

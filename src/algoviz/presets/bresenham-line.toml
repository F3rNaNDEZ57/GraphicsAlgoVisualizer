[preset]
name = "Bresenham Line"
canvas = "grid"
description = "Classic integer line rasterization."
source = '''
dx = abs(xr - xl)
dy = -abs(yr - yl)
sx = 1
if xl > xr:
    sx = -1
sy = 1
if yl > yr:
    sy = -1
err = dx + dy
x = xl
y = yl
done = 0
while done == 0:
    PlotPixel(x, y)
    if x == xr and y == yr:
        done = 1
    else:
        e2 = 2 * err
        if e2 >= dy and x != xr:
            err = err + dy
            x = x + sx
        if e2 <= dx and y != yr:
            err = err + dx
            y = y + sy
'''

[canvas]
width = 40
height = 30
background = "black"

[inputs.xl]
type = "int"
default = 2
min = 0
max = 39
label = "Start X"

[inputs.yl]
type = "int"
default = 2
min = 0
max = 29
label = "Start Y"

[inputs.xr]
type = "int"
default = 24
min = 0
max = 39
label = "End X"

[inputs.yr]
type = "int"
default = 11
min = 0
max = 29
label = "End Y"
